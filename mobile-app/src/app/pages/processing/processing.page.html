<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="header-title font-headline">Processing</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="processing-container">
    <div class="orb-wrapper">
      <div class="orb-pulse"></div>
      <div class="orb">
        <span class="material-symbols-outlined orb-icon" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
      </div>
    </div>

    <h2 class="processing-title font-headline">Processing meeting...</h2>
    <p class="processing-subtitle">AI is transcribing and identifying speakers.</p>

    <div class="progress-bar-wrapper">
      <div class="progress-bar-track">
        <div class="progress-bar-fill"></div>
      </div>
    </div>

    <p class="processing-hint">This may take 30-120 seconds depending on meeting length.</p>
  </div>
</ion-content>
